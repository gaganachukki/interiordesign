<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Stackly.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/register.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card register-card auth-theme">
            <h2 class="auth-title theme-text">Stackly Interiors</h2>
            <p class="auth-subtitle" style="font-size: 1.1rem; color: #fff !important; margin-bottom: 1.5rem;">Create Account</p>
            
            <form class="auth-form" action="404.html">
                <div class="form-group">
                    <input type="text" id="fullname" class="auth-input" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <select id="role" class="auth-input" required>
                        <option value="" disabled selected hidden>Select Role</option>
                        <option value="admin">Admin</option>
                        <option value="client">Client</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
                </div>
                <div class="form-group password-group">
                    <input type="password" id="password" class="auth-input" placeholder="Password" required>
                    <span class="password-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </span>
                </div>
                <div class="form-group password-group">
                    <input type="password" id="confirm_password" class="auth-input" placeholder="Confirm Password" required>
                    <span class="password-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </span>
                </div>
                
                <div class="form-options">
                    <label class="remember-me" style="font-size: 0.8rem; display: flex; align-items: center; gap: 0.5rem; color: #9ca3af;">
                        <input type="checkbox" required> I agree to Terms & Privacy
                    </label>
                </div>
                
                <button type="submit" class="btn-theme auth-btn">Sign Up</button>
            </form>
            
            <div class="social-login-section">
                <p class="or-text">Or sign up with</p>
                <div class="social-buttons">
                    <button type="button" class="social-btn" aria-label="Sign in with Google" onclick="window.location.href='404.html'">G</button>
                    <button type="button" class="social-btn" aria-label="Sign in with Facebook" onclick="window.location.href='404.html'">f</button>
                </div>
            </div>
            
            <p class="auth-footer" style="margin-bottom: 0;">Already have an account? <a href="login.html" class="theme-link">Login</a></p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('.auth-form');
            
            form.addEventListener('submit', (e) => {
                e.preventDefault(); // Prevent default form submission
                
                const fullname = document.getElementById('fullname').value.trim();
                const role = document.getElementById('role').value;
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm_password').value;
                const terms = document.querySelector('input[type="checkbox"]').checked;

                // Basic validation
                if (!fullname || !role || !email || !password || !confirmPassword || !terms) {
                    alert('Please fill in all fields and agree to the terms.');
                    return;
                }

                if (password !== confirmPassword) {
                    alert('Passwords do not match.');
                    return;
                }

                // Store in localStorage
                const userDetails = {
                    fullname,
                    role,
                    email,
                    password // Note: Storing plain text password is only for demonstration purposes
                };
                
                localStorage.setItem('stackly_user', JSON.stringify(userDetails));
                
                alert('Registration successful! Redirecting to login page...');
                window.location.href = 'login.html';
            });
        });
    </script>
</body>
</html>
