<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stackly.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="auth-body">
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="preloader-content">
            <img src="assets/logo.webp" alt="Stackly" class="preloader-logo">
            <div class="preloader-spinner"></div>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-card auth-theme">
            <h2 class="auth-title theme-text">Stackly Interiors</h2>
            <p class="auth-subtitle">Welcome back! Please sign in.</p>
            
            <form class="auth-form" action="404.html">
                <div class="form-group">
                    <select id="role" class="auth-input" required>
                        <option value="" disabled selected hidden>Select Role</option>
                        <option value="admin">Admin</option>
                        <option value="client">Client</option>
                    </select>
                </div>
                <div class="form-group">
                    <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
                </div>
                <div class="form-group password-group">
                    <input type="password" id="password" class="auth-input" placeholder="Password" required minlength="6">
                    <span class="password-toggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                    </span>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="404.html" class="forgot-password theme-link">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn-theme auth-btn">Sign In</button>
            </form>
            
            <div class="social-login-section">
                <p class="or-text">Or sign in with</p>
                <div class="social-buttons">
                    <button type="button" class="social-btn" aria-label="Sign in with Google" onclick="window.location.href='404.html'">G</button>
                    <button type="button" class="social-btn" aria-label="Sign in with Facebook" onclick="window.location.href='404.html'">f</button>
                </div>
            </div>
            
            <p class="auth-footer">New to Stackly Academy? <a href="register.html" class="theme-link">Sign Up</a></p>
            
            <a href="index.html" class="go-home-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Go Home
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('.auth-form');
            
            // Password toggle logic
            const toggles = document.querySelectorAll('.password-toggle');
            toggles.forEach(toggle => {
                toggle.addEventListener('click', function() {
                    const input = this.previousElementSibling;
                    if (input.type === 'password') {
                        input.type = 'text';
                        this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
                    } else {
                        input.type = 'password';
                        this.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
                    }
                });
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault(); // Prevent default form submission
                
                const role = document.getElementById('role').value;
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!role || !email || !password) {
                    alert('Please fill in all fields.');
                    return;
                }

                // Check if email is a gmail address (as requested)
                if (!email.toLowerCase().endsWith('@gmail.com')) {
                    alert('Please use a valid @gmail.com email address.');
                    return;
                }

                // Store email in localStorage to retrieve name later
                localStorage.setItem('userEmail', email);

                // Redirect based on selected role
                if (role === 'admin') {
                    window.location.href = 'admindashboard.html';
                } else if (role === 'client') {
                    window.location.href = 'userdashboard.html';
                } else {
                    alert('Invalid role selected.');
                }
            });
        });
    </script>
</body>
</html>
