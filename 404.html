<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Stackly.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/404.css">
</head>
<body class="error-body">
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="preloader-content">
            <img src="assets/logo.webp" alt="Stackly" class="preloader-logo">
            <div class="preloader-spinner"></div>
        </div>
    </div>

    <!-- Navbar (Simplified) -->
    <header class="navbar scrolled" style="position: absolute; top: 0; width: 100%;">
        <a href="index.html" class="logo" style="text-decoration: none;">
            <img src="assets/logo.webp" alt="Stackly" class="site-logo">
        </a>
    </header>

    <div class="error-container">
        <div class="error-content">
            <h1 class="error-code">404!</h1>
            <h2 class="error-title">Space Not Found</h2>
            <p class="error-desc">It looks like the room you're looking for hasn't been designed yet, or the link is broken.</p>
            <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 2rem;">
                <button onclick="window.history.back()" class="btn-theme return-btn" style="margin-top: 0; background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Go Back
                </button>
                <a href="index.html" class="btn-theme return-btn" style="margin-top: 0;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Return to Homepage
                </a>
            </div>
        </div>
        
        <!-- Animated Background Elements -->
        <div class="floating-elements">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
